name: Mirror to Azure DevOps

on:
  push:
    branches:
      - '**'
    tags:
      - '**'
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push branch or tag to Azure DevOps
        env:
          AZURE_DEVOPS_PAT: ${{ secrets.AZURE_DEVOPS_PAT }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail

          git remote add azure "https://git:${AZURE_DEVOPS_PAT}@dev.azure.com/erp-maquinarias1/ERP-COMPRAS/_git/ERP-COMPRAS"

          if [ "$REF_TYPE" = "branch" ]; then
            git push azure "HEAD:refs/heads/${REF_NAME}"
          else
            git push azure "refs/tags/${REF_NAME}:refs/tags/${REF_NAME}"
          fi
