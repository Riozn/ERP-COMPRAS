name: $(Date:yyyyMMdd).$(Rev:r)

trigger:
  branches:
    include:
      - master
      - main

pr:
  branches:
    include:
      - master
      - main

variables:
  - group: erp1-shared
  - name: nodeVersion
    value: '22.x'
  - name: backendImageName
    value: 'erp1-backend'
  - name: frontendImageName
    value: 'erp1-frontend'
  - name: backendImageTag
    value: '$(Build.BuildId)'

stages:
  - stage: Validate
    displayName: Validate code
    jobs:
      - job: BackendAndFrontend
        displayName: Backend and frontend validation
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            fetchDepth: 0

          - task: NodeTool@0
            displayName: Use Node.js $(nodeVersion)
            inputs:
              versionSpec: $(nodeVersion)

          - script: |
              set -euo pipefail
              cd backend
              npm ci
              npm test
              npm run build
            displayName: Backend tests and build

          - script: |
              set -euo pipefail
              cd frontend
              npm ci
              npm test -- --run
              npm run build
            displayName: Frontend tests and build

  - stage: BuildBackendImage
    displayName: Build and push backend image
    dependsOn: Validate
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - job: BuildBackend
        displayName: Build backend container
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            fetchDepth: 0

          - task: AzureCLI@2
            displayName: Build and push backend image
            inputs:
              azureSubscription: AzureServiceConnectionERP
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                acrName="${ACR_LOGIN_SERVER%%.*}"
                az acr login --name "$acrName"

                docker build \
                  -f backend/Dockerfile \
                  -t "$(ACR_LOGIN_SERVER)/$(backendImageName):$(backendImageTag)" \
                  -t "$(ACR_LOGIN_SERVER)/$(backendImageName):latest" \
                  .

                docker push "$(ACR_LOGIN_SERVER)/$(backendImageName):$(backendImageTag)"
                docker push "$(ACR_LOGIN_SERVER)/$(backendImageName):latest"

  - stage: DeployCurrent
    displayName: Deploy to current environment
    dependsOn: BuildBackendImage
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - job: DeployCurrent
        displayName: Deploy backend and frontend
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            fetchDepth: 0

          - task: AzureCLI@2
            displayName: Build and push frontend image
            inputs:
              azureSubscription: AzureServiceConnectionERP
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                acrName="${ACR_LOGIN_SERVER%%.*}"
                az acr login --name "$acrName"
                backendPublicUrl="${BACKEND_PUBLIC_URL:-https://${BACKEND_WEBAPP_NAME}.azurewebsites.net}"
                backendPublicUrl="${backendPublicUrl%/}"

                docker build \
                  -f frontend/Dockerfile \
                  --build-arg VITE_API_URL="$backendPublicUrl/api" \
                  -t "$(ACR_LOGIN_SERVER)/$(frontendImageName):$(backendImageTag)" \
                  -t "$(ACR_LOGIN_SERVER)/$(frontendImageName):latest" \
                  ./frontend

                docker push "$(ACR_LOGIN_SERVER)/$(frontendImageName):$(backendImageTag)"
                docker push "$(ACR_LOGIN_SERVER)/$(frontendImageName):latest"

          - task: AzureCLI@2
            displayName: Deploy backend and frontend to App Service
            inputs:
              azureSubscription: AzureServiceConnectionERP
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                frontendPublicUrl="${FRONTEND_PUBLIC_URL:-https://${FRONTEND_WEBAPP_NAME}.azurewebsites.net}"
                frontendPublicUrl="${frontendPublicUrl%/}"

                az webapp config container set \
                  --resource-group "$(RESOURCE_GROUP)" \
                  --name "$(BACKEND_WEBAPP_NAME)" \
                  --container-image-name "$(ACR_LOGIN_SERVER)/$(backendImageName):$(backendImageTag)" \
                  --docker-registry-server-url "https://$(ACR_LOGIN_SERVER)" \
                  --docker-registry-server-user "$(ACR_USERNAME)" \
                  --docker-registry-server-password "$(ACR_PASSWORD)"

                az webapp config appsettings set \
                  --resource-group "$(RESOURCE_GROUP)" \
                  --name "$(BACKEND_WEBAPP_NAME)" \
                  --settings \
                  PORT=3001 \
                  WEBSITES_PORT=3001 \
                  NODE_ENV=production \
                  DATABASE_URL="$(DATABASE_URL)" \
                  JWT_SECRET="$(JWT_SECRET)" \
                  JWT_ACCESS_TOKEN_EXPIRES_IN="15m" \
                  REFRESH_TOKEN_EXPIRES_DAYS="30" \
                  TWO_FACTOR_DEFAULT_CHANNEL="EMAIL" \
                  EXPOSE_2FA_CODE="false" \
                  CORS_ORIGINS="$frontendPublicUrl" \
                  CORS_ALLOW_CREDENTIALS=false

                az webapp config container set \
                  --resource-group "$(RESOURCE_GROUP)" \
                  --name "$(FRONTEND_WEBAPP_NAME)" \
                  --container-image-name "$(ACR_LOGIN_SERVER)/$(frontendImageName):$(backendImageTag)" \
                  --docker-registry-server-url "https://$(ACR_LOGIN_SERVER)" \
                  --docker-registry-server-user "$(ACR_USERNAME)" \
                  --docker-registry-server-password "$(ACR_PASSWORD)"

                az webapp config appsettings set \
                  --resource-group "$(RESOURCE_GROUP)" \
                  --name "$(FRONTEND_WEBAPP_NAME)" \
                  --settings \
                  WEBSITES_PORT=80

                az webapp restart \
                  --resource-group "$(RESOURCE_GROUP)" \
                  --name "$(BACKEND_WEBAPP_NAME)"

                az webapp restart \
                  --resource-group "$(RESOURCE_GROUP)" \
                  --name "$(FRONTEND_WEBAPP_NAME)"
