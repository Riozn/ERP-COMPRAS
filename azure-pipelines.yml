name: $(Date:yyyyMMdd).$(Rev:r)

trigger:
  branches:
    include:
      - master
      - main

pr:
  branches:
    include:
      - master
      - main

variables:
  - group: erp1-shared
  - name: nodeVersion
    value: '22.x'
  - name: backendImageName
    value: 'erp1-backend'
  - name: frontendImageName
    value: 'erp1-frontend'
  - name: backendImageTag
    value: '$(Build.BuildId)'

stages:
  - stage: Validate
    displayName: Validate code
    jobs:
      - job: BackendAndFrontend
        displayName: Backend and frontend validation
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            fetchDepth: 0

          - task: NodeTool@0
            displayName: Use Node.js $(nodeVersion)
            inputs:
              versionSpec: $(nodeVersion)

          - script: |
              set -euo pipefail
              cd backend
              npm ci
              npm test
              npm run build
            displayName: Backend tests and build

          - script: |
              set -euo pipefail
              cd frontend
              npm ci
              npm test -- --run
              npm run build
            displayName: Frontend tests and build

  - stage: BuildBackendImage
    displayName: Build and push backend image
    dependsOn: Validate
    condition: succeeded()
    jobs:
      - job: BuildBackend
        displayName: Build backend container
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            fetchDepth: 0

          - task: Docker@2
            displayName: Login to ACR
            inputs:
              command: login
              containerRegistry: $(ACR_SERVICE_CONNECTION)

          - task: Docker@2
            displayName: Build and push backend image
            inputs:
              command: buildAndPush
              containerRegistry: $(ACR_SERVICE_CONNECTION)
              repository: $(backendImageName)
              dockerfile: backend/Dockerfile
              buildContext: .
              tags: |
                $(backendImageTag)
                latest

  - stage: DeployStaging
    displayName: Deploy to staging
    dependsOn: BuildBackendImage
    condition: succeeded()
    jobs:
      - deployment: DeployStaging
        displayName: Staging deployment
        environment: erp1-staging
        variables:
          - group: erp1-staging
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                  fetchDepth: 0

                - task: Docker@2
                  displayName: Login to ACR
                  inputs:
                    command: login
                    containerRegistry: $(ACR_SERVICE_CONNECTION)

                - script: |
                    set -euo pipefail
                    docker build \
                      -f frontend/Dockerfile \
                      --build-arg VITE_API_URL="$(BACKEND_PUBLIC_URL)" \
                      -t "$(ACR_LOGIN_SERVER)/$(frontendImageName):$(backendImageTag)-staging" \
                      -t "$(ACR_LOGIN_SERVER)/$(frontendImageName):staging-latest" \
                      ./frontend
                    docker push "$(ACR_LOGIN_SERVER)/$(frontendImageName):$(backendImageTag)-staging"
                    docker push "$(ACR_LOGIN_SERVER)/$(frontendImageName):staging-latest"
                  displayName: Build and push staging frontend image

                - task: AzureCLI@2
                  displayName: Deploy backend and frontend to staging App Service
                  inputs:
                    azureSubscription: $(AZURE_SERVICE_CONNECTION)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail

                      az webapp config container set \
                        --resource-group "$(RESOURCE_GROUP)" \
                        --name "$(BACKEND_WEBAPP_NAME)" \
                        --container-image-name "$(ACR_LOGIN_SERVER)/$(backendImageName):$(backendImageTag)" \
                        --docker-registry-server-url "https://$(ACR_LOGIN_SERVER)" \
                        --docker-registry-server-user "$(ACR_USERNAME)" \
                        --docker-registry-server-password "$(ACR_PASSWORD)"

                      az webapp config appsettings set \
                        --resource-group "$(RESOURCE_GROUP)" \
                        --name "$(BACKEND_WEBAPP_NAME)" \
                        --settings \
                        PORT=3001 \
                        NODE_ENV=production \
                        CORS_ORIGINS="$(FRONTEND_PUBLIC_URL)" \
                        CORS_ALLOW_CREDENTIALS=false

                      az webapp config container set \
                        --resource-group "$(RESOURCE_GROUP)" \
                        --name "$(FRONTEND_WEBAPP_NAME)" \
                        --container-image-name "$(ACR_LOGIN_SERVER)/$(frontendImageName):$(backendImageTag)-staging" \
                        --docker-registry-server-url "https://$(ACR_LOGIN_SERVER)" \
                        --docker-registry-server-user "$(ACR_USERNAME)" \
                        --docker-registry-server-password "$(ACR_PASSWORD)"

                      az webapp config appsettings set \
                        --resource-group "$(RESOURCE_GROUP)" \
                        --name "$(FRONTEND_WEBAPP_NAME)" \
                        --settings \
                        WEBSITES_PORT=80

                      az webapp restart \
                        --resource-group "$(RESOURCE_GROUP)" \
                        --name "$(BACKEND_WEBAPP_NAME)"

                      az webapp restart \
                        --resource-group "$(RESOURCE_GROUP)" \
                        --name "$(FRONTEND_WEBAPP_NAME)"

  - stage: DeployProduction
    displayName: Deploy to production
    dependsOn: DeployStaging
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/master'))
    jobs:
      - deployment: DeployProduction
        displayName: Production deployment
        environment: erp1-production
        variables:
          - group: erp1-production
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                  fetchDepth: 0

                - task: Docker@2
                  displayName: Login to ACR
                  inputs:
                    command: login
                    containerRegistry: $(ACR_SERVICE_CONNECTION)

                - script: |
                    set -euo pipefail
                    docker build \
                      -f frontend/Dockerfile \
                      --build-arg VITE_API_URL="$(BACKEND_PUBLIC_URL)" \
                      -t "$(ACR_LOGIN_SERVER)/$(frontendImageName):$(backendImageTag)-production" \
                      -t "$(ACR_LOGIN_SERVER)/$(frontendImageName):production-latest" \
                      ./frontend
                    docker push "$(ACR_LOGIN_SERVER)/$(frontendImageName):$(backendImageTag)-production"
                    docker push "$(ACR_LOGIN_SERVER)/$(frontendImageName):production-latest"
                  displayName: Build and push production frontend image

                - task: AzureCLI@2
                  displayName: Deploy backend and frontend to production App Service
                  inputs:
                    azureSubscription: $(AZURE_SERVICE_CONNECTION)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail

                      az webapp config container set \
                        --resource-group "$(RESOURCE_GROUP)" \
                        --name "$(BACKEND_WEBAPP_NAME)" \
                        --container-image-name "$(ACR_LOGIN_SERVER)/$(backendImageName):$(backendImageTag)" \
                        --docker-registry-server-url "https://$(ACR_LOGIN_SERVER)" \
                        --docker-registry-server-user "$(ACR_USERNAME)" \
                        --docker-registry-server-password "$(ACR_PASSWORD)"

                      az webapp config appsettings set \
                        --resource-group "$(RESOURCE_GROUP)" \
                        --name "$(BACKEND_WEBAPP_NAME)" \
                        --settings \
                        PORT=3001 \
                        NODE_ENV=production \
                        CORS_ORIGINS="$(FRONTEND_PUBLIC_URL)" \
                        CORS_ALLOW_CREDENTIALS=false

                      az webapp config container set \
                        --resource-group "$(RESOURCE_GROUP)" \
                        --name "$(FRONTEND_WEBAPP_NAME)" \
                        --container-image-name "$(ACR_LOGIN_SERVER)/$(frontendImageName):$(backendImageTag)-production" \
                        --docker-registry-server-url "https://$(ACR_LOGIN_SERVER)" \
                        --docker-registry-server-user "$(ACR_USERNAME)" \
                        --docker-registry-server-password "$(ACR_PASSWORD)"

                      az webapp config appsettings set \
                        --resource-group "$(RESOURCE_GROUP)" \
                        --name "$(FRONTEND_WEBAPP_NAME)" \
                        --settings \
                        WEBSITES_PORT=80

                      az webapp restart \
                        --resource-group "$(RESOURCE_GROUP)" \
                        --name "$(BACKEND_WEBAPP_NAME)"

                      az webapp restart \
                        --resource-group "$(RESOURCE_GROUP)" \
                        --name "$(FRONTEND_WEBAPP_NAME)"
